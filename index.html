<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Flow</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#111827">

<link rel="icon" href="icon-192.png">

</head>


<body class="login-mode">

<!-- LOGIN -->

<section id="login" class="login-screen">

<img src="mundoled.png" class="logo-empresa">

<div class="login-card">

<h1>E-Flow</h1>

<p>Control de cheques</p>

<input type="password" id="clave" placeholder="Clave de acceso">

<button id="loginBtn" class="primary">Ingresar</button>

<button id="installBtnLogin" class="ghost hidden">
Instalar app
</button>

</div>

</section>



<!-- APP -->

<main id="app" class="app hidden">

<header class="topbar">

<div class="brand">

<img src="eflow.png" class="logo-app">

<div>

<strong>E-Flow</strong>
<p>Agenda de cheques</p>

</div>

</div>

</header>



<!-- PANEL -->

<section id="panelView" class="view active">

<div class="section-head">

<h2>Panel principal</h2>
<p>Cheques pendientes</p>

</div>


<div id="statusBanner" class="status-banner hidden"></div>


<div class="dashboard">

<div class="card">

<span>Total a pagar</span>
<strong id="total">$0</strong>

</div>


<div class="card">

<span>Cheques a pagar</span>
<strong id="cantidad">0</strong>

</div>


<div class="card green tappable" data-filter="green">

<span>Más de 30 días</span>
<strong id="greenCount">0</strong>

</div>


<div class="card yellow tappable" data-filter="yellow">

<span>Menos de 15 días</span>
<strong id="yellowCount">0</strong>

</div>


<div class="card orange tappable" data-filter="orange">

<span>Menos de 5 días</span>
<strong id="orangeCount">0</strong>

</div>


<div class="card red tappable" data-filter="red">

<span>1 día o hoy</span>
<strong id="redCount">0</strong>

</div>

</div>

</section>



<!-- LISTA CHEQUES -->

<section id="chequesView" class="view">

<div class="section-head">

<h2 id="chequesTitle">Cheques</h2>

<p id="chequesSubtitle">Listado</p>

</div>


<input id="buscar" class="buscador" placeholder="Buscar proveedor o banco">


<div id="lista" class="lista"></div>

</section>




<!-- CONFIG -->

<section id="configView" class="view">

<div class="section-head">

<h2>Configuración</h2>

</div>

<button id="logoutBtn" class="ghost danger">

Cerrar sesión

</button>

</section>




<!-- MENU -->

<nav class="menu">

<button class="menu-item active" data-view="panelView">

🏠
<span>Panel</span>

</button>


<button class="menu-item" data-view="chequesView">

📄
<span>Cheques</span>

</button>


<button class="menu-item" data-view="configView">

⚙️
<span>Config</span>

</button>

</nav>


</main>



<script src="app.js"></script>


</body>
</html>
