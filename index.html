<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">

<title>E-Flow</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
margin:0;
background:#eef1f5;
}

.header{
background:#1e2a38;
color:white;
padding:16px;
font-size:20px;
text-align:center;
}

.login{
padding:40px 20px;
}

.login input{
width:100%;
padding:14px;
font-size:16px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.login button{
width:100%;
padding:14px;
font-size:16px;
background:#1e2a38;
color:white;
border:none;
border-radius:8px;
}

#app{
display:none;
padding:15px;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
font-size:14px;
color:#555;
}

.card h2{
margin:5px 0 0 0;
}

.lista{
display:flex;
flex-direction:column;
gap:10px;
}

.cheque{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.proveedor{
font-weight:bold;
font-size:16px;
}

.monto{
color:#27ae60;
font-size:18px;
}

.estado{
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="header">
E-Flow
</div>

<div class="login" id="login">

<input type="password" id="clave" placeholder="Clave">

<button onclick="entrar()">Ingresar</button>

</div>

<div id="app">

<div class="cards">

<div class="card">
<h3>Total cheques</h3>
<h2 id="cantidad">0</h2>
</div>

<div class="card">
<h3>Total $</h3>
<h2 id="total">$0</h2>
</div>

</div>

<div class="lista" id="lista"></div>

</div>

<script>

const PASSWORD="1234nn"

function entrar(){

let clave=document.getElementById("clave").value

if(clave===PASSWORD){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

cargar()

}else{

alert("Clave incorrecta")

}

}

function cargar(){

const API="https://script.google.com/macros/s/AKfycbwP6d0JB6zJdLhJizcGHPw2cs4v3Xohreh-Qxa2AbRZWDlg91RG6j3NTdfZQpMzdx1LGw/exec"

fetch(API)
.then(r=>r.json())
.then(data=>{

let total=0

const lista=document.getElementById("lista")

data.forEach(c=>{

let monto=parseFloat(
String(c.monto).replace(/\./g,"").replace(",",".")
)

if(!isNaN(monto)) total+=monto

const div=document.createElement("div")

div.className="cheque"

div.innerHTML=`

<div class="proveedor">${c.proveedor}</div>

<div>Pago: ${c.fechaPago}</div>

<div class="monto">$ ${c.monto}</div>

<div class="estado">${c.estado}</div>

`

lista.appendChild(div)

})

document.getElementById("cantidad").innerText=data.length

document.getElementById("total").innerText="$ "+total.toLocaleString("es-AR")

})

}

</script>

</body>
</html>
