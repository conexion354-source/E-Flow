<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>E-Flow | Panel de Cheques</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
}

.total{background:#2c3e50;color:white}
.hoy{background:#27ae60;color:white}
.siete{background:#f1c40f}
.quince{background:#e67e22;color:white}
.mas{background:#e74c3c;color:white}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
font-size:14px;
}

th{
background:#222;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

.monto{
text-align:right;
}

</style>

</head>

<body>

<h1>E-Flow | Panel de Cheques</h1>

<div class="dashboard">

<div class="card total">
<h3>Total $</h3>
<h2 id="total">$0</h2>
</div>

<div class="card hoy">
<h3>Hoy</h3>
<h2 id="hoy">0</h2>
</div>

<div class="card siete">
<h3>1-7 días</h3>
<h2 id="siete">0</h2>
</div>

<div class="card quince">
<h3>8-15 días</h3>
<h2 id="quince">0</h2>
</div>

<div class="card mas">
<h3>+15 días</h3>
<h2 id="mas">0</h2>
</div>

</div>


<table id="tabla">

<thead>
<tr>

<th>Fecha salida</th>
<th>Proveedor</th>
<th>Fecha pago</th>
<th>Banco</th>
<th>N° cheque</th>
<th>Tipo</th>
<th>Monto</th>
<th>Estado</th>

</tr>
</thead>

<tbody></tbody>

</table>


<script>

const API="https://script.google.com/macros/s/AKfycbw9F4mZYEfxW7cgbKwg3oZ2eNLkRzLG2-AaT6f2BnBazZ3nMq6JokoVJ5b6Dmk7vc9P/exec"

fetch(API)
.then(r=>r.json())
.then(data=>{

const tbody=document.querySelector("#tabla tbody")

let total=0
let hoy=0
let siete=0
let quince=0
let mas=0

const hoyFecha=new Date()

data.forEach(c=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${c.fechaSalida}</td>
<td>${c.proveedor}</td>
<td>${c.fechaPago}</td>
<td>${c.banco}</td>
<td>${c.numeroCheque}</td>
<td>${c.tipo}</td>
<td class="monto">$ ${c.monto}</td>
<td>${c.estado}</td>

`

tbody.appendChild(tr)

let monto=parseFloat(
String(c.monto)
.replace(/\./g,"")
.replace(",",".")
)

if(!isNaN(monto)) total+=monto

let fechaPago=new Date(c.fechaPago)
let diff=(fechaPago-hoyFecha)/(1000*60*60*24)

if(diff<=0) hoy++
else if(diff<=7) siete++
else if(diff<=15) quince++
else mas++

})

document.getElementById("total").innerText=
"$ "+total.toLocaleString("es-AR")

document.getElementById("hoy").innerText=hoy
document.getElementById("siete").innerText=siete
document.getElementById("quince").innerText=quince
document.getElementById("mas").innerText=mas

})

</script>

</body>
</html>
